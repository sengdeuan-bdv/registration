<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppSheet Data Analytics</title>
    <!-- Google Fonts: Noto Sans Lao -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans Lao', sans-serif;
            background-color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .dropdown-content {
            display: none;
            position: absolute;
            z-index: 100;
            margin-top: 0.25rem;
            width: 100%;
            min-width: 260px;
            background: white;
            border: 1px solid #e0e7ff;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-height: 350px;
            overflow-y: auto;
        }
        .dropdown-content.show { display: block; }
        
        #pivotTable th, #pivotTable td {
            padding: 0.35rem 0.5rem;
            font-size: 0.75rem;
            line-height: 1.2;
            border: 1px solid #e2e8f0;
        }

        .sticky-col {
            position: sticky;
            left: 0;
            background: white;
            z-index: 10;
        }
        thead th.sticky-col { z-index: 40; background: #1e3a8a; }

        #filterBody {
            transition: max-height 0.3s ease-out, opacity 0.2s ease-in;
            overflow: visible; 
        }
        #filterBody.hidden-panel {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .dropdown-trigger:hover {
            border-color: #6366f1;
            background-color: #f5f7ff;
        }
    </style>
</head>
<body class="p-2 md:p-4">
    <div class="max-w-[1600px] mx-auto space-y-3">
        <!-- Header -->
        <header class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-700 text-white rounded-lg shadow-md">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 tracking-tight leading-none">AppSheet Analytics Dashboard</h1>
                    <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest mt-1">Professional Data Report</p>
                </div>
            </div>
            <div class="flex items-center gap-2 w-full md:w-auto">
                <input type="file" id="csvFileInput" accept=".csv" class="hidden" />
                <button onclick="document.getElementById('csvFileInput').click()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-4 py-2 rounded-lg font-bold transition-all border border-indigo-200 text-xs shadow-sm">
                    <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                    <span id="uploadBtnText">ອັບໂຫຼດ CSV</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="dashboardArea" class="hidden space-y-3">
            <!-- Filter Section -->
            <section class="bg-white rounded-xl shadow-lg border border-indigo-100 overflow-visible relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-800 via-indigo-600 to-blue-500"></div>
                <div class="px-4 py-2 border-b border-indigo-100 flex items-center justify-between bg-indigo-50/20">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="toggleFilterPanel()">
                        <div class="p-1 bg-indigo-700 text-white rounded-md"><i data-lucide="filter" class="w-3.5 h-3.5"></i></div>
                        <div>
                            <h3 class="text-xs font-bold text-indigo-950 flex items-center gap-1">
                                ກັ່ນຕອງຂໍ້ມູນ (Filters)
                                <i data-lucide="chevron-down" id="filterChevron" class="w-3 h-3 transition-transform"></i>
                            </h3>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="clearAllFilters()" class="text-[10px] text-red-600 hover:text-red-700 font-bold px-2 py-1 hover:bg-red-50 rounded transition-colors">
                            ລ້າງການກອງທັງໝົດ
                        </button>
                    </div>
                </div>
                
                <div id="filterBody" class="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 bg-white">
                    <div id="filter_domain" class="filter-group"></div>
                    <div id="filter_type" class="filter-group"></div>
                    <div id="filter_level" class="filter-group"></div>
                    <div id="filter_date" class="filter-group"></div>
                    <div id="filter_participantType" class="filter-group"></div>
                </div>
            </section>

            <!-- Table Section -->
            <section class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                <div class="px-4 py-2 border-b border-slate-100 flex flex-col sm:flex-row sm:justify-between sm:items-center bg-white gap-3">
                    <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                        <div class="flex items-center gap-2">
                            <div class="p-1 bg-slate-100 text-slate-600 rounded-md"><i data-lucide="table" class="w-4 h-4"></i></div>
                            <h3 class="font-bold text-slate-800 text-xs">ບົດສະຫຼຸບຜົນການວິເຄາະ (Pivot Table)</h3>
                        </div>
                        <!-- Count Type Selector -->
                        <div class="flex items-center bg-slate-100 p-0.5 rounded-lg border border-slate-200 shadow-inner">
                            <button id="countNormalBtn" onclick="setCountType('normal')" class="px-3 py-1 text-[10px] font-bold rounded-md transition-all bg-white text-indigo-700 shadow-sm">
                                Count (ນັບທັງໝົດ)
                            </button>
                            <button id="countDistinctBtn" onclick="setCountType('distinct')" class="px-3 py-1 text-[10px] font-bold rounded-md transition-all text-slate-500 hover:text-slate-700">
                                Distinct (ນັບບໍ່ຊ້ຳ ID)
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <p id="recordCountLabel" class="text-[9px] text-slate-400 font-bold uppercase tracking-wider mr-2"></p>
                        <button onclick="exportToExcel()" class="flex items-center justify-center gap-2 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-bold transition-all shadow-sm active:scale-95 border-b-2 border-emerald-800 text-[10px]">
                            <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5"></i>
                            ສົ່ງອອກລາຍງານ Excel (.xlsx)
                        </button>
                    </div>
                </div>
                
                <div class="overflow-x-auto max-h-[600px] overflow-y-auto custom-scrollbar" id="tableWrapper">
                    <table class="w-full text-left relative border-separate border-spacing-0" id="pivotTable">
                        <thead class="sticky top-0 z-20 shadow-sm" id="tableHead">
                            <!-- Header injected dynamically -->
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <!-- Welcome Screen -->
        <section id="welcomeScreen" class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-10 flex flex-col items-center justify-center text-center shadow-sm">
            <div class="bg-indigo-50 p-4 rounded-full mb-3">
                <i data-lucide="file-spreadsheet" class="text-indigo-600 w-10 h-10"></i>
            </div>
            <h2 class="text-lg font-black text-slate-800 mb-2 font-bold">ຍິນດີຕ້ອນຮັບສູ່ລະບົບວິເຄາະຂໍ້ມູນ AppSheet</h2>
            <p class="text-xs text-slate-500 max-w-sm mb-6 font-medium">
                ກະລຸນາອັບໂຫຼດໄຟລ໌ CSV ທີ່ Export ມາຈາກ AppSheet ເພື່ອເລີ່ມຕົ້ນການສ້າງລາຍງານ.
            </p>
            <button onclick="document.getElementById('csvFileInput').click()" class="bg-indigo-700 hover:bg-indigo-800 text-white px-8 py-3 rounded-xl font-black transition-all shadow-lg flex items-center gap-3 active:scale-95 border-b-4 border-indigo-950 text-sm">
                <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                ເລືອກໄຟລ໌ CSV ດຽວນີ້
            </button>
        </section>
    </div>

    <script>
        let rawData = [];
        let filters = { domain: [], type: [], level: [], date: [], participantType: [] };
        let filterOptions = {};
        let isFilterPanelOpen = true;
        let activeDropdownId = null;
        let countType = 'normal';
        let lastAnalysisResult = { rows: [], grandTotals: {}, orgTypes: [] };

        window.onload = () => {
            lucide.createIcons();
            setupFileUpload();
        };

        function setCountType(type) {
            countType = type;
            const normalBtn = document.getElementById('countNormalBtn');
            const distinctBtn = document.getElementById('countDistinctBtn');
            if (type === 'normal') {
                normalBtn.className = "px-3 py-1 text-[10px] font-bold rounded-md transition-all bg-white text-indigo-700 shadow-sm";
                distinctBtn.className = "px-3 py-1 text-[10px] font-bold rounded-md transition-all text-slate-500 hover:text-slate-700";
            } else {
                distinctBtn.className = "px-3 py-1 text-[10px] font-bold rounded-md transition-all bg-white text-indigo-700 shadow-sm";
                normalBtn.className = "px-3 py-1 text-[10px] font-bold rounded-md transition-all text-slate-500 hover:text-slate-700";
            }
            renderTable();
        }

        function toggleFilterPanel() {
            const body = document.getElementById('filterBody');
            const chevron = document.getElementById('filterChevron');
            isFilterPanelOpen = !isFilterPanelOpen;
            if (isFilterPanelOpen) {
                body.classList.remove('hidden-panel');
                chevron.classList.remove('rotate-180');
            } else {
                body.classList.add('hidden-panel');
                chevron.classList.add('rotate-180');
                closeAllDropdowns();
            }
        }

        function setupFileUpload() {
            const input = document.getElementById('csvFileInput');
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => processData(event.target.result);
                reader.readAsText(file);
            };
        }

        function processData(csvText) {
            rawData = parseCSV(csvText);
            resetFilters();
            updateUI();
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('dashboardArea').classList.remove('hidden');
        }

        function parseCSV(str) {
            const arr = [];
            let quote = false;
            for (let row = 0, col = 0, c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c + 1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            if (!arr.length) return [];
            const headers = arr[0].map(h => h.trim());
            const data = [];
            for (let i = 1; i < arr.length; i++) {
                if (arr[i].length <= 1 && arr[i][0] === '') continue;
                const rowObj = {};
                headers.forEach((header, index) => {
                    rowObj[header] = arr[i][index] !== undefined ? arr[i][index].trim() : '';
                });
                data.push(rowObj);
            }
            return data;
        }

        function getMonthYear(dateString) {
            if (!dateString) return 'ບໍ່ລະບຸ';
            const parts = dateString.split('/');
            return parts.length === 3 ? `${parts[0].padStart(2, '0')}/${parts[2]}` : dateString;
        }

        function resetFilters() {
            filters = { domain: [], type: [], level: [], date: [], participantType: [] };
            const domainSet = new Set(), typeSet = new Set(), levelSet = new Set(), partTypeSet = new Set(), dateSet = new Set();
            
            rawData.forEach(row => {
                if (row['Event Domain (Virtual)']) domainSet.add(row['Event Domain (Virtual)']);
                if (row['Event type (Virtual)']) typeSet.add(row['Event type (Virtual)']);
                if (row['Event level (Virtual)']) levelSet.add(row['Event level (Virtual)']);
                if (row['Participant type']) partTypeSet.add(row['Participant type']);
                if (row['Event Start date (Virtual)']) dateSet.add(getMonthYear(row['Event Start date (Virtual)']));
            });
            
            const dateGroups = {};
            Array.from(dateSet).forEach(d => {
                const parts = d.split('/');
                const y = parts.length === 2 ? parts[1] : 'ບໍ່ລະບຸ';
                if (!dateGroups[y]) dateGroups[y] = [];
                dateGroups[y].push(d);
            });
            
            filterOptions = {
                domain: Array.from(domainSet).sort(),
                type: Array.from(typeSet).sort(),
                level: Array.from(levelSet).sort(),
                participantType: Array.from(partTypeSet).sort(),
                date: Object.keys(dateGroups).sort((a, b) => b.localeCompare(a)).map(y => ({ year: y, months: dateGroups[y].sort() }))
            };
        }

        function updateUI() {
            renderFilterGroups();
            renderTable();
        }

        function renderFilterGroups() {
            const configs = [
                { id: 'domain', label: 'Event Domain', options: filterOptions.domain, container: 'filter_domain' },
                { id: 'type', label: 'Event Type', options: filterOptions.type, container: 'filter_type' },
                { id: 'level', label: 'Event Level', options: filterOptions.level, container: 'filter_level' },
                { id: 'date', label: 'Date (ປີ/ເດືອນ)', options: filterOptions.date, container: 'filter_date', isDate: true },
                { id: 'participantType', label: 'Part. Type', options: filterOptions.participantType, container: 'filter_participantType' }
            ];
            
            configs.forEach(conf => {
                const container = document.getElementById(conf.container);
                const sel = filters[conf.id].length;
                const tot = conf.isDate ? conf.options.reduce((a, b) => a + b.months.length, 0) : conf.options.length;
                const txt = (sel === 0 || sel === tot) ? 'ລວມທັງໝົດ' : `ເລືອກແລ້ວ (${sel})`;
                const isShow = activeDropdownId === conf.id ? 'show' : '';

                container.innerHTML = `
                    <div class="relative w-full dropdown-parent">
                        <label class="block text-[9px] font-bold text-indigo-900 uppercase tracking-wider mb-1">${conf.label}</label>
                        <button id="trigger_${conf.id}" class="w-full flex items-center justify-between bg-white border border-indigo-200 rounded-lg px-2 py-1.5 text-[11px] text-left shadow-sm dropdown-trigger overflow-hidden">
                            <span class="truncate pr-1 font-medium text-slate-700">${txt}</span>
                            <i data-lucide="chevron-down" class="text-indigo-500 w-3 h-3"></i>
                        </button>
                        <div id="content_${conf.id}" class="dropdown-content custom-scrollbar ${isShow}">
                            <div class="flex items-center gap-2 px-3 py-2 hover:bg-indigo-50 cursor-pointer border-b sticky top-0 bg-white z-10" onclick="handleFilterClear('${conf.id}')">
                                <i data-lucide="${sel === 0 ? 'check-square' : 'square'}" class="w-4 h-4 text-indigo-600"></i>
                                <span class="text-xs font-bold text-indigo-900">ເລືອກທັງໝົດ</span>
                            </div>
                            <div class="options-list">
                                ${conf.isDate ? renderDateOptions(conf.options) : renderNormalOptions(conf.id, conf.options)}
                            </div>
                            <div class="sticky bottom-0 bg-slate-50 border-t p-2 flex justify-end">
                                <button onclick="closeAllDropdowns()" class="bg-indigo-600 text-white text-[10px] px-4 py-1.5 rounded-lg font-bold shadow-sm hover:bg-indigo-700 transition-colors">
                                    ຕົກລົງ (ປິດ)
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
            setupDropdowns();
        }

        function renderNormalOptions(id, opts) {
            return opts.map(o => {
                const isS = filters[id].includes(o);
                return `<div class="flex items-center gap-2 px-3 py-1.5 hover:bg-slate-50 cursor-pointer" onclick="toggleFilter('${id}', '${o}')">
                    <i data-lucide="${isS ? 'check-square' : 'square'}" class="w-3.5 h-3.5 ${isS ? 'text-indigo-600' : 'text-slate-300'}"></i>
                    <span class="text-[11px] ${isS ? 'text-indigo-900 font-medium' : 'text-slate-600'}">${o || 'ບໍ່ລະບຸ'}</span>
                </div>`;
            }).join('');
        }

        function renderDateOptions(groups) {
            return groups.map(g => {
                const all = g.months.length > 0 && g.months.every(m => filters.date.includes(m));
                const som = !all && g.months.some(m => filters.date.includes(m));
                return `<div class="border-b border-slate-50">
                    <div class="flex items-center justify-between px-3 py-1.5 hover:bg-slate-50 cursor-pointer bg-slate-50/50" onclick="toggleDateGroup('${g.year}', ${JSON.stringify(g.months).replace(/"/g, '&quot;')})">
                        <div class="flex items-center gap-2">
                            <i data-lucide="${all ? 'check-square' : (som ? 'minus-square' : 'square')}" class="w-3.5 h-3.5 ${all || som ? 'text-indigo-600' : 'text-slate-300'}"></i>
                            <span class="text-[11px] font-bold text-indigo-950">${g.year === 'ບໍ່ລະບຸ' ? 'ບໍ່ລະບຸ' : 'ປີ ' + g.year}</span>
                        </div>
                    </div>
                    <div class="bg-white">
                        ${g.months.map(m => {
                            const isS = filters.date.includes(m);
                            return `<div class="flex items-center gap-2 px-3 py-1.5 pl-8 hover:bg-indigo-50/50 cursor-pointer" onclick="toggleFilter('date', '${m}')">
                                <i data-lucide="${isS ? 'check-square' : 'square'}" class="w-3 h-3 ${isS ? 'text-indigo-600' : 'text-slate-300'}"></i>
                                <span class="text-[11px] ${isS ? 'text-indigo-900' : 'text-slate-600'}">${m.split('/')[0]}</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function setupDropdowns() {
            document.querySelectorAll('.dropdown-trigger').forEach(t => {
                t.onclick = (e) => {
                    e.stopPropagation();
                    const id = t.id.split('_')[1];
                    const content = document.getElementById(`content_${id}`);
                    const was = content.classList.contains('show');
                    closeAllDropdowns();
                    if (!was) { content.classList.add('show'); activeDropdownId = id; }
                };
            });
            window.onclick = (e) => {
                if (!e.target.closest('.dropdown-parent')) {
                    closeAllDropdowns();
                }
            };
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-content').forEach(c => c.classList.remove('show'));
            activeDropdownId = null;
        }

        function toggleFilter(id, val) {
            const idx = filters[id].indexOf(val);
            if (idx > -1) filters[id].splice(idx, 1); else filters[id].push(val);
            updateUI(); 
        }

        function toggleDateGroup(year, months) {
            if (months.every(m => filters.date.includes(m))) filters.date = filters.date.filter(m => !months.includes(m));
            else months.forEach(m => { if (!filters.date.includes(m)) filters.date.push(m); });
            updateUI();
        }

        function handleFilterClear(id) { filters[id] = []; updateUI(); }
        
        function clearAllFilters() { 
            filters = { domain: [], type: [], level: [], date: [], participantType: [] }; 
            activeDropdownId = null; 
            updateUI(); 
        }

        function renderTable() {
            const filtered = rawData.filter(row => {
                const dDate = getMonthYear(row['Event Start date (Virtual)']);
                return (filters.domain.length === 0 || filters.domain.includes(row['Event Domain (Virtual)'])) &&
                       (filters.type.length === 0 || filters.type.includes(row['Event type (Virtual)'])) &&
                       (filters.level.length === 0 || filters.level.includes(row['Event level (Virtual)'])) &&
                       (filters.participantType.length === 0 || filters.participantType.includes(row['Participant type'])) &&
                       (filters.date.length === 0 || filters.date.includes(dDate));
            });

            document.getElementById('recordCountLabel').innerText = `ພົບ ${filtered.length} ລາຍການ`;

            const orgTypesSet = new Set();
            filtered.forEach(row => { if (row['Participant Organization type (Virtual)']) orgTypesSet.add(row['Participant Organization type (Virtual)']); });
            const orgTypes = Array.from(orgTypesSet).sort();

            const grouped = {};
            filtered.forEach(row => {
                const host = row['Event Host (Virtual)'] || '(ບໍ່ລະບຸ Host)';
                const name = row['Event name (Virtual)'] || '(ບໍ່ລະບຸ Event)';
                const gender = row['Participant Gender (Virtual)'];
                const partId = row['Participant ID'] || 'no-id';
                const orgType = row['Participant Organization type (Virtual)'] || '(ບໍ່ລະບຸ)';
                
                if (!grouped[host]) grouped[host] = {};
                if (!grouped[host][name]) grouped[host][name] = { 
                    events: new Set(), femaleNormal: 0, maleNormal: 0, 
                    femaleDistinct: new Set(), maleDistinct: new Set(),
                    dates: new Set(), orgCounts: {}
                };
                
                const g = grouped[host][name];
                if (row['Event ID']) g.events.add(row['Event ID']);
                if (row['Event Start date (Virtual)']) g.dates.add(row['Event Start date (Virtual)']);
                
                if (!g.orgCounts[orgType]) g.orgCounts[orgType] = { normal: 0, distinct: new Set() };
                g.orgCounts[orgType].normal++;
                g.orgCounts[orgType].distinct.add(partId);

                if (gender?.toLowerCase() === 'female' || gender === 'ຍິງ') { g.femaleNormal++; g.femaleDistinct.add(partId); }
                else if (gender?.toLowerCase() === 'male' || gender === 'ຊາຍ') { g.maleNormal++; g.maleDistinct.add(partId); }
            });

            const head = document.getElementById('tableHead');
            head.innerHTML = `
                <tr class="bg-[#1e3a8a] text-white">
                    <th class="sticky left-0 bg-[#1e3a8a] z-30 font-bold uppercase text-[10px] w-32 border-b border-indigo-900">Event Host</th>
                    <th class="font-bold uppercase text-[10px] border-b border-indigo-900">Event Name</th>
                    <th class="font-bold uppercase text-[10px] border-b border-indigo-900">Event ID</th>
                    <th class="font-bold uppercase text-[10px] border-b border-indigo-900">ວັນທີ</th>
                    <th class="text-center font-bold uppercase text-[10px] bg-blue-800/50 w-16 border-b border-indigo-900 text-blue-100">Event</th>
                    <th class="text-center font-bold uppercase text-[10px] bg-pink-800/50 w-12 border-b border-indigo-900 text-pink-100">ຍິງ</th>
                    <th class="text-center font-bold uppercase text-[10px] bg-sky-800/50 w-12 border-b border-indigo-900 text-sky-100">ຊາຍ</th>
                    <th class="text-center font-bold uppercase text-[10px] bg-indigo-900/60 w-16 border-b border-indigo-900">ລວມ</th>
                    ${orgTypes.map(t => `<th class="text-center font-bold uppercase text-[10px] bg-slate-800/50 border-b border-indigo-900">${t}</th>`).join('')}
                </tr>`;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let gtEvents = new Set(), gtFNormal = 0, gtMNormal = 0, gtFDist = new Set(), gtMDist = new Set();
            const gtOrgTypes = {};
            orgTypes.forEach(t => gtOrgTypes[t] = { normal: 0, distinct: new Set() });

            const hosts = Object.keys(grouped).sort();
            const rowsForExport = [];

            if (!hosts.length) {
                tbody.innerHTML = `<tr><td colspan="${8 + orgTypes.length}" class="px-6 py-10 text-center text-slate-400 font-bold text-sm">ບໍ່ພົບຂໍ້ມູນ</td></tr>`;
                return;
            }

            hosts.forEach(host => {
                const events = Object.keys(grouped[host]).sort();
                events.forEach((name, i) => {
                    const g = grouped[host][name];
                    const cF = countType === 'distinct' ? g.femaleDistinct.size : g.femaleNormal;
                    const cM = countType === 'distinct' ? g.maleDistinct.size : g.maleNormal;
                    
                    gtFNormal += g.femaleNormal; gtMNormal += g.maleNormal;
                    g.femaleDistinct.forEach(id => gtFDist.add(id)); g.maleDistinct.forEach(id => gtMDist.add(id));
                    g.events.forEach(id => gtEvents.add(id));

                    const typeCounts = orgTypes.map(t => {
                        const val = g.orgCounts[t];
                        const count = val ? (countType === 'distinct' ? val.distinct.size : val.normal) : 0;
                        if (val) {
                            gtOrgTypes[t].normal += val.normal;
                            val.distinct.forEach(id => gtOrgTypes[t].distinct.add(id));
                        }
                        return count;
                    });

                    const tr = document.createElement('tr');
                    tr.className = 'group hover:bg-slate-50 transition-colors';
                    let hTd = i === 0 ? `<td rowspan="${events.length}" class="sticky left-0 bg-white align-top pt-2 font-bold text-slate-900 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] truncate max-w-[120px] group-hover:bg-slate-50 border-r border-slate-200">${host}</td>` : '';
                    
                    tr.innerHTML = `
                        ${hTd}
                        <td class="text-slate-700 min-w-[180px] leading-tight font-medium">${name}</td>
                        <td class="text-slate-500 min-w-[100px] text-[9px]">${Array.from(g.events).join(', ')}</td>
                        <td class="text-slate-500 text-[9px]">${Array.from(g.dates).join(', ')}</td>
                        <td class="text-center font-bold text-blue-700 bg-blue-50/20">${g.events.size}</td>
                        <td class="text-center font-bold text-pink-600 bg-pink-50/20">${cF.toLocaleString()}</td>
                        <td class="text-center font-bold text-sky-600 bg-sky-50/30">${cM.toLocaleString()}</td>
                        <td class="text-center font-bold text-indigo-700 bg-indigo-50/40">${(cF + cM).toLocaleString()}</td>
                        ${typeCounts.map(c => `<td class="text-center text-slate-600 bg-slate-50/30">${c > 0 ? c.toLocaleString() : '-'}</td>`).join('')}`;
                    tbody.appendChild(tr);

                    rowsForExport.push({ host, isFirst: i === 0, hostCount: events.length, name, ids: Array.from(g.events).join(', '), date: Array.from(g.dates).join(', '), evC: g.events.size, f: cF, m: cM, tot: cF+cM, typeCounts });
                });
            });

            const fF = countType === 'distinct' ? gtFDist.size : gtFNormal;
            const fM = countType === 'distinct' ? gtMDist.size : gtMNormal;
            const fT = orgTypes.map(t => countType === 'distinct' ? gtOrgTypes[t].distinct.size : gtOrgTypes[t].normal);

            const ftr = document.createElement('tr');
            ftr.className = 'bg-slate-900 text-white font-bold sticky bottom-0 z-20';
            ftr.innerHTML = `
                <td colspan="4" class="px-3 py-2 text-right border-r border-slate-700 sticky left-0 bg-slate-900 z-30 uppercase tracking-widest text-[9px]">Grand Total (${countType === 'distinct' ? 'ບໍ່ຊ້ຳ' : 'ທັງໝົດ'})</td>
                <td class="text-center bg-blue-900 text-[11px]">${gtEvents.size}</td>
                <td class="text-center bg-pink-900 text-[11px]">${fF.toLocaleString()}</td>
                <td class="text-center bg-sky-900 text-[11px]">${fM.toLocaleString()}</td>
                <td class="text-center bg-indigo-900 border-l border-indigo-700 text-[11px]">${(fF + fM).toLocaleString()}</td>
                ${fT.map(v => `<td class="text-center bg-slate-800 text-[11px]">${v.toLocaleString()}</td>`).join('')}`;
            tbody.appendChild(ftr);

            lastAnalysisResult = { rows: rowsForExport, grandTotals: { ev: gtEvents.size, f: fF, m: fM, t: fF + fM, types: fT }, orgTypes, type: countType, activeFilters: { ...filters } };
        }

        function exportToExcel() {
            if (!lastAnalysisResult.rows.length || !window.XLSX) { alert("ບໍ່ມີຂໍ້ມູນໃຫ້ສົ່ງອອກ"); return; }
            const res = lastAnalysisResult;
            const typeLabel = res.type === 'distinct' ? "ນັບແບບບໍ່ຊ້ຳກັນ (Distinct Count)" : "ນັບຈຳນວນທັງໝົດ (Normal Count)";
            const headers = ["Event Host", "Event Name", "Event ID", "ວັນທີຈັດຕັ້ງປະຕິບັດ", "ຈຳນວນ Event", "ຍິງ", "ຊາຍ", "ລວມຜູ້ເຂົ້າຮ່ວມ", ...res.orgTypes];
            
            const getFilterTxt = (arr) => (arr && arr.length > 0) ? arr.join(', ') : "ທັງໝົດ";
            
            const wsData = [
                ["AppSheet Analysis Report - Organization Type Report"],
                ["ວັນທີສະຫຼຸບ:", new Date().toLocaleDateString()],
                ["ຮູບແບບການນັບ:", typeLabel],
                [],
                ["ເງື່ອນໄຂການກັ່ນຕອງ (Active Filters):"],
                ["Domain:", getFilterTxt(res.activeFilters.domain)],
                ["Type:", getFilterTxt(res.activeFilters.type)],
                ["Level:", getFilterTxt(res.activeFilters.level)],
                ["Date Range:", getFilterTxt(res.activeFilters.date)],
                ["Participant Type:", getFilterTxt(res.activeFilters.participantType)],
                [],
                headers
            ];

            const merges = [
                { s: { r: 0, c: 0 }, e: { r: 0, c: headers.length - 1 } },
                { s: { r: 4, c: 0 }, e: { r: 4, c: 1 } }
            ];
            for(let i=5; i<=9; i++) merges.push({ s: { r: i, c: 1 }, e: { r: i, c: headers.length - 1 } });

            let cur = 11; 
            res.rows.forEach(r => {
                if (r.isFirst && r.hostCount > 1) merges.push({ s: { r: cur, c: 0 }, e: { r: cur + r.hostCount - 1, c: 0 } });
                wsData.push([r.host, r.name, r.ids, r.date, r.evC, r.f, r.m, r.tot, ...r.typeCounts]);
                cur++;
            });
            
            wsData.push([`ລວມທັງໝົດ (${res.type === 'distinct' ? 'ບໍ່ຊ້ຳ' : 'ທັງໝົດ'})`, "", "", "", res.grandTotals.ev, res.grandTotals.f, res.grandTotals.m, res.grandTotals.t, ...res.grandTotals.types]);
            merges.push({ s: { r: cur, c: 0 }, e: { r: cur, c: 3 } });

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!merges'] = merges;
            ws['!cols'] = [{ wch: 20 }, { wch: 30 }, { wch: 20 }, { wch: 20 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 15 }, ...res.orgTypes.map(() => ({ wch: 15 }))];
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Org_Type_Report");
            XLSX.writeFile(wb, `AppSheet_Analysis_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    </script>
</body>
</html>
