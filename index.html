<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppSheet Data Analytics</title>
    <!-- Google Fonts: Noto Sans Lao -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans Lao', sans-serif;
            background-color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Dropdown content improvements */
        .dropdown-content {
            display: none;
            position: absolute;
            z-index: 100;
            margin-top: 0.25rem;
            width: 100%;
            min-width: 240px;
            background: white;
            border: 1px solid #e0e7ff;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
        }
        .dropdown-content.show { display: block; }
        
        /* Compact Table Styling */
        #pivotTable th, #pivotTable td {
            padding: 0.5rem 0.75rem; /* Reduced padding for compactness */
            font-size: 0.8rem;
        }

        .sticky-col {
            position: sticky;
            left: 0;
            background: white;
            z-index: 10;
        }
        thead th.sticky-col { z-index: 40; background: #1e3a8a; }

        /* Animation for filter panel */
        #filterBody {
            transition: max-height 0.3s ease-out, opacity 0.2s ease-in;
            overflow: visible; /* Essential for dropdowns */
        }
        #filterBody.hidden-panel {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-7xl mx-auto space-y-4">
        <!-- Header -->
        <header class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-700 text-white rounded-lg shadow-md">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">AppSheet Data Analytics</h1>
                    <p class="text-xs text-slate-500 font-medium">ວິເຄາະຂໍ້ມູນ ແລະ ສົ່ງອອກ Excel</p>
                </div>
            </div>
            <div class="flex items-center gap-2 w-full md:w-auto">
                <input type="file" id="csvFileInput" accept=".csv" class="hidden" />
                <button onclick="document.getElementById('csvFileInput').click()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-4 py-2 rounded-lg font-bold transition-all border border-indigo-200 text-sm">
                    <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                    <span id="uploadBtnText">ອັບໂຫຼດ CSV</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="dashboardArea" class="hidden space-y-4">
            <!-- Filter Section -->
            <section class="bg-white rounded-xl shadow-lg border border-indigo-100 overflow-visible relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-800 via-indigo-600 to-blue-500"></div>
                <div class="px-5 py-3 border-b border-indigo-100 flex items-center justify-between bg-indigo-50/20">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="toggleFilterPanel()">
                        <div class="p-1.5 bg-indigo-700 text-white rounded-md"><i data-lucide="filter" class="w-4 h-4"></i></div>
                        <div>
                            <h3 class="text-sm font-bold text-indigo-950 flex items-center gap-2">
                                ກັ່ນຕອງຂໍ້ມູນ 
                                <i data-lucide="chevron-down" id="filterChevron" class="w-4 h-4 transition-transform"></i>
                            </h3>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="clearAllFilters()" class="text-xs text-red-600 hover:text-red-700 font-bold px-3 py-1.5 hover:bg-red-50 rounded-md transition-colors">
                            ລ້າງການກອງ
                        </button>
                    </div>
                </div>
                
                <div id="filterBody" class="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 bg-white">
                    <div id="filter_domain" class="filter-group"></div>
                    <div id="filter_type" class="filter-group"></div>
                    <div id="filter_level" class="filter-group"></div>
                    <div id="filter_date" class="filter-group"></div>
                    <div id="filter_participantType" class="filter-group"></div>
                </div>
            </section>

            <!-- Table Section -->
            <section class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                <div class="px-5 py-3 border-b border-slate-100 flex flex-col sm:flex-row sm:justify-between sm:items-center bg-white gap-3">
                    <div class="flex items-center gap-3">
                        <div class="p-1.5 bg-slate-100 text-slate-600 rounded-md"><i data-lucide="table" class="w-4 h-4"></i></div>
                        <div>
                            <h3 class="font-bold text-slate-800 text-sm">ບົດສະຫຼຸບຜົນການວິເຄາະ</h3>
                            <p id="recordCountLabel" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider"></p>
                        </div>
                    </div>
                    <button onclick="exportToExcel()" class="flex items-center justify-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-bold transition-all shadow-sm active:scale-95 border-b-2 border-emerald-800 text-xs">
                        <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                        Export .xlsx
                    </button>
                </div>
                
                <div class="overflow-x-auto max-h-[600px] overflow-y-auto custom-scrollbar" id="tableWrapper">
                    <table class="w-full text-left relative border-separate border-spacing-0" id="pivotTable">
                        <thead class="sticky top-0 z-20 shadow-sm">
                            <tr class="bg-[#1e3a8a] text-white">
                                <th class="border-b border-indigo-900 sticky left-0 bg-[#1e3a8a] z-30 font-bold uppercase tracking-wider text-[11px]">Event Host</th>
                                <th class="border-b border-indigo-900 font-bold uppercase tracking-wider text-[11px]">Event Name</th>
                                <th class="border-b border-indigo-900 font-bold uppercase tracking-wider text-[11px]">ວັນທີ</th>
                                <th class="text-center border-b border-indigo-900 bg-blue-800/50 font-bold uppercase tracking-wider text-[11px]">Event</th>
                                <th class="text-center border-b border-indigo-900 bg-pink-800/50 font-bold uppercase tracking-wider text-[11px]">ຍິງ</th>
                                <th class="text-center border-b border-indigo-900 bg-sky-800/50 font-bold uppercase tracking-wider text-[11px]">ຊາຍ</th>
                                <th class="text-center border-b border-indigo-900 bg-indigo-900/60 font-bold uppercase tracking-wider text-[11px]">ລວມ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <!-- Welcome Screen -->
        <section id="welcomeScreen" class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-12 flex flex-col items-center justify-center text-center shadow-sm">
            <div class="bg-indigo-50 p-5 rounded-full mb-4">
                <i data-lucide="file-spreadsheet" class="text-indigo-600 w-12 h-12"></i>
            </div>
            <h2 class="text-xl font-black text-slate-800 mb-3">ກຽມພ້ອມວິເຄາະຂໍ້ມູນ AppSheet</h2>
            <p class="text-sm text-slate-500 max-w-sm mb-6 font-medium">
                ກະລຸນາອັບໂຫຼດໄຟລ໌ CSV ທີ່ Export ມາຈາກ AppSheet ເພື່ອເລີ່ມຕົ້ນການວິເຄາະ.
            </p>
            <button onclick="document.getElementById('csvFileInput').click()" class="bg-indigo-700 hover:bg-indigo-800 text-white px-8 py-3 rounded-xl font-black transition-all shadow-lg flex items-center gap-3 active:scale-95 border-b-4 border-indigo-950 text-sm">
                <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                ເລືອກໄຟລ໌ CSV
            </button>
        </section>
    </div>

    <script>
        // Global State
        let rawData = [];
        let filters = { domain: [], type: [], level: [], date: [], participantType: [] };
        let filterOptions = {};
        let isFilterPanelOpen = true;

        // Initialization
        window.onload = () => {
            lucide.createIcons();
            setupFileUpload();
        };

        function toggleFilterPanel() {
            const body = document.getElementById('filterBody');
            const chevron = document.getElementById('filterChevron');
            isFilterPanelOpen = !isFilterPanelOpen;
            
            if (isFilterPanelOpen) {
                body.classList.remove('hidden-panel');
                chevron.classList.remove('rotate-180');
            } else {
                body.classList.add('hidden-panel');
                chevron.classList.add('rotate-180');
                // Close any open dropdowns when panel closes
                document.querySelectorAll('.dropdown-content').forEach(c => c.classList.remove('show'));
            }
        }

        function setupFileUpload() {
            const input = document.getElementById('csvFileInput');
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    processData(text);
                };
                reader.readAsText(file);
            };
        }

        function processData(csvText) {
            rawData = parseCSV(csvText);
            resetFilters();
            updateUI();
            
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('dashboardArea').classList.remove('hidden');
        }

        function parseCSV(str) {
            const arr = [];
            let quote = false;
            for (let row = 0, col = 0, c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c + 1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            if (!arr.length) return [];
            const headers = arr[0].map(h => h.trim());
            const data = [];
            for (let i = 1; i < arr.length; i++) {
                if (arr[i].length <= 1 && arr[i][0] === '') continue;
                const rowObj = {};
                headers.forEach((header, index) => {
                    rowObj[header] = arr[i][index] !== undefined ? arr[i][index].trim() : '';
                });
                data.push(rowObj);
            }
            return data;
        }

        function getMonthYear(dateString) {
            if (!dateString) return 'ບໍ່ລະບຸ';
            const parts = dateString.split('/');
            if (parts.length === 3) {
                return `${parts[0].padStart(2, '0')}/${parts[2]}`;
            }
            return dateString;
        }

        function resetFilters() {
            filters = { domain: [], type: [], level: [], date: [], participantType: [] };
            const domainSet = new Set(), typeSet = new Set(), levelSet = new Set(), partTypeSet = new Set(), dateSet = new Set();

            rawData.forEach(row => {
                if (row['Event Domain (Virtual)']) domainSet.add(row['Event Domain (Virtual)']);
                if (row['Event type (Virtual)']) typeSet.add(row['Event type (Virtual)']);
                if (row['Event level (Virtual)']) levelSet.add(row['Event level (Virtual)']);
                if (row['Participant type']) partTypeSet.add(row['Participant type']);
                if (row['Event Start date (Virtual)']) dateSet.add(getMonthYear(row['Event Start date (Virtual)']));
            });

            const dateGroups = {};
            Array.from(dateSet).forEach(d => {
                if (d === 'ບໍ່ລະບຸ') {
                    if (!dateGroups['ບໍ່ລະບຸ']) dateGroups['ບໍ່ລະບຸ'] = [];
                    dateGroups['ບໍ່ລະບຸ'].push(d);
                } else {
                    const [m, y] = d.split('/');
                    if (!dateGroups[y]) dateGroups[y] = [];
                    dateGroups[y].push(d);
                }
            });

            filterOptions = {
                domain: Array.from(domainSet).sort(),
                type: Array.from(typeSet).sort(),
                level: Array.from(levelSet).sort(),
                participantType: Array.from(partTypeSet).sort(),
                date: Object.keys(dateGroups).sort((a, b) => b.localeCompare(a)).map(y => ({
                    year: y,
                    months: dateGroups[y].sort()
                }))
            };
        }

        function updateUI() {
            renderFilterGroups();
            renderTable();
        }

        function renderFilterGroups() {
            const configs = [
                { id: 'domain', label: 'Domain', options: filterOptions.domain, container: 'filter_domain' },
                { id: 'type', label: 'Type', options: filterOptions.type, container: 'filter_type' },
                { id: 'level', label: 'Level', options: filterOptions.level, container: 'filter_level' },
                { id: 'date', label: 'Date (ປີ/ເດືອນ)', options: filterOptions.date, container: 'filter_date', isDate: true },
                { id: 'participantType', label: 'Part. Type', options: filterOptions.participantType, container: 'filter_participantType' }
            ];

            configs.forEach(conf => {
                const container = document.getElementById(conf.container);
                const selectedCount = filters[conf.id].length;
                const totalCount = conf.isDate ? conf.options.reduce((a, b) => a + b.months.length, 0) : conf.options.length;
                const displayText = (selectedCount === 0 || selectedCount === totalCount) ? 'ລວມທັງໝົດ' : `ເລືອກແລ້ວ (${selectedCount})`;

                container.innerHTML = `
                    <div class="relative w-full">
                        <label class="block text-[10px] font-bold text-indigo-900 uppercase tracking-wider mb-1">${conf.label}</label>
                        <button class="w-full flex items-center justify-between bg-white border border-indigo-200 rounded-lg px-3 py-2 text-xs text-left shadow-sm dropdown-trigger overflow-hidden">
                            <span class="truncate pr-1 font-medium text-slate-700">${displayText}</span>
                            <i data-lucide="chevron-down" class="text-indigo-500 w-3 h-3 flex-shrink-0"></i>
                        </button>
                        <div class="dropdown-content custom-scrollbar">
                            <div class="flex items-center gap-2 px-3 py-2 hover:bg-indigo-50 cursor-pointer border-b sticky top-0 bg-white z-10" onclick="handleFilterClear('${conf.id}')">
                                <i data-lucide="${selectedCount === 0 ? 'check-square' : 'square'}" class="w-4 h-4 text-indigo-600"></i>
                                <span class="text-xs font-bold text-indigo-900">ເລືອກທັງໝົດ</span>
                            </div>
                            <div class="options-list">
                                ${conf.isDate ? renderDateOptions(conf.options) : renderNormalOptions(conf.id, conf.options)}
                            </div>
                        </div>
                    </div>
                `;
            });

            lucide.createIcons();
            setupDropdowns();
        }

        function renderNormalOptions(id, opts) {
            return opts.map(opt => {
                const isSelected = filters[id].includes(opt);
                return `
                    <div class="flex items-center gap-2 px-3 py-2 hover:bg-slate-50 cursor-pointer" onclick="toggleFilter('${id}', '${opt}')">
                        <i data-lucide="${isSelected ? 'check-square' : 'square'}" class="w-3.5 h-3.5 ${isSelected ? 'text-indigo-600' : 'text-slate-300'}"></i>
                        <span class="text-xs ${isSelected ? 'text-indigo-900 font-medium' : 'text-slate-600'}">${opt || 'ບໍ່ລະບຸ'}</span>
                    </div>
                `;
            }).join('');
        }

        function renderDateOptions(groups) {
            return groups.map(g => {
                const groupSelected = g.months.every(m => filters.date.includes(m));
                const someSelected = !groupSelected && g.months.some(m => filters.date.includes(m));
                return `
                    <div class="border-b border-slate-50">
                        <div class="flex items-center justify-between px-3 py-1.5 hover:bg-slate-50 cursor-pointer bg-slate-50/50" onclick="toggleDateGroup('${g.year}', ${JSON.stringify(g.months).replace(/"/g, '&quot;')})">
                            <div class="flex items-center gap-2">
                                <i data-lucide="${groupSelected ? 'check-square' : (someSelected ? 'minus-square' : 'square')}" class="w-3.5 h-3.5 ${groupSelected || someSelected ? 'text-indigo-600' : 'text-slate-300'}"></i>
                                <span class="text-xs font-bold text-indigo-950">${g.year === 'ບໍ່ລະບຸ' ? 'ບໍ່ລະບຸ' : 'ປີ ' + g.year}</span>
                            </div>
                        </div>
                        <div class="bg-white">
                            ${g.months.map(m => {
                                const isSel = filters.date.includes(m);
                                return `
                                    <div class="flex items-center gap-2 px-3 py-1.5 pl-8 hover:bg-indigo-50/50 cursor-pointer" onclick="toggleFilter('date', '${m}')">
                                        <i data-lucide="${isSel ? 'check-square' : 'square'}" class="w-3 h-3 ${isSel ? 'text-indigo-600' : 'text-slate-300'}"></i>
                                        <span class="text-xs ${isSel ? 'text-indigo-900' : 'text-slate-600'}">${m.split('/')[0]}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setupDropdowns() {
            document.querySelectorAll('.dropdown-trigger').forEach(trigger => {
                trigger.onclick = (e) => {
                    e.stopPropagation();
                    const content = trigger.nextElementSibling;
                    const wasShow = content.classList.contains('show');
                    document.querySelectorAll('.dropdown-content').forEach(c => c.classList.remove('show'));
                    if (!wasShow) content.classList.add('show');
                };
            });
            window.onclick = () => document.querySelectorAll('.dropdown-content').forEach(c => c.classList.remove('show'));
            document.querySelectorAll('.dropdown-content').forEach(c => c.onclick = (e) => e.stopPropagation());
        }

        function toggleFilter(id, val) {
            const idx = filters[id].indexOf(val);
            if (idx > -1) filters[id].splice(idx, 1);
            else filters[id].push(val);
            updateUI();
        }

        function toggleDateGroup(year, months) {
            const allIn = months.every(m => filters.date.includes(m));
            if (allIn) filters.date = filters.date.filter(m => !months.includes(m));
            else months.forEach(m => { if (!filters.date.includes(m)) filters.date.push(m); });
            updateUI();
        }

        function handleFilterClear(id) { filters[id] = []; updateUI(); }
        function clearAllFilters() { filters = { domain: [], type: [], level: [], date: [], participantType: [] }; updateUI(); }

        function renderTable() {
            const filtered = rawData.filter(row => {
                const dDate = getMonthYear(row['Event Start date (Virtual)']);
                return (filters.domain.length === 0 || filters.domain.includes(row['Event Domain (Virtual)'])) &&
                       (filters.type.length === 0 || filters.type.includes(row['Event type (Virtual)'])) &&
                       (filters.level.length === 0 || filters.level.includes(row['Event level (Virtual)'])) &&
                       (filters.participantType.length === 0 || filters.participantType.includes(row['Participant type'])) &&
                       (filters.date.length === 0 || filters.date.includes(dDate));
            });

            document.getElementById('recordCountLabel').innerText = `ພົບທັງໝົດ ${filtered.length} ລາຍການ`;

            const grouped = {};
            filtered.forEach(row => {
                const host = row['Event Host (Virtual)'] || '(ບໍ່ລະບຸ Host)';
                const name = row['Event name (Virtual)'] || '(ບໍ່ລະບຸ Event)';
                const gender = row['Participant Gender (Virtual)'];
                if (!grouped[host]) grouped[host] = {};
                if (!grouped[host][name]) grouped[host][name] = { events: new Set(), female: 0, male: 0, dates: new Set() };
                if (row['Event ID']) grouped[host][name].events.add(row['Event ID']);
                if (row['Event Start date (Virtual)']) grouped[host][name].dates.add(row['Event Start date (Virtual)']);
                const isF = gender?.toLowerCase() === 'female' || gender === 'ຍິງ';
                const isM = gender?.toLowerCase() === 'male' || gender === 'ຊາຍ';
                if (isF) grouped[host][name].female++;
                else if (isM) grouped[host][name].male++;
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let gtEvents = new Set(), gtF = 0, gtM = 0;
            const hosts = Object.keys(grouped).sort();
            
            if (!hosts.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-slate-400 font-bold">ບໍ່ພົບຂໍ້ມູນຕາມການກອງ</td></tr>';
                return;
            }

            hosts.forEach(host => {
                const events = Object.keys(grouped[host]).sort();
                events.forEach((name, i) => {
                    const s = grouped[host][name];
                    const total = s.female + s.male;
                    gtF += s.female; gtM += s.male;
                    s.events.forEach(id => gtEvents.add(id));
                    const tr = document.createElement('tr');
                    tr.className = 'group hover:bg-slate-50 transition-colors';
                    let hostTd = i === 0 ? `<td rowspan="${events.length}" class="border-r border-slate-200 sticky left-0 bg-white align-top pt-2 font-bold text-slate-900 group-hover:bg-slate-50 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">${host}</td>` : '';
                    tr.innerHTML = `
                        ${hostTd}
                        <td class="text-slate-700 min-w-[200px]">${name}</td>
                        <td class="text-slate-500 whitespace-nowrap text-[10px]">${Array.from(s.dates).join(', ')}</td>
                        <td class="text-center font-bold text-blue-700 bg-blue-50/30">${s.events.size}</td>
                        <td class="text-center font-bold text-pink-600 bg-pink-50/30">${s.female}</td>
                        <td class="text-center font-bold text-sky-600 bg-sky-50/30">${s.male}</td>
                        <td class="text-center font-bold text-indigo-700 bg-indigo-50/40">${total}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });

            const ftr = document.createElement('tr');
            ftr.className = 'bg-slate-900 text-white font-bold sticky bottom-0 z-20';
            ftr.innerHTML = `
                <td colspan="3" class="px-6 py-3 text-right border-r border-slate-700 sticky left-0 bg-slate-900 z-30 uppercase tracking-widest text-[10px]">Grand Total</td>
                <td class="text-center bg-blue-900">${gtEvents.size}</td>
                <td class="text-center bg-pink-900">${gtF}</td>
                <td class="text-center bg-sky-900">${gtM}</td>
                <td class="text-center bg-indigo-900 border-l border-indigo-700">${gtF + gtM}</td>
            `;
            tbody.appendChild(ftr);
        }

        function exportToExcel() {
            const table = document.getElementById('pivotTable');
            const wb = XLSX.utils.table_to_book(table, { sheet: "Analysis" });
            XLSX.writeFile(wb, `Report_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    </script>
</body>
</html>
